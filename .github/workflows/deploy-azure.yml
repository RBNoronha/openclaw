name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.mdx"
      - ".agents/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Which agent to deploy"
        required: false
        default: "all"
        type: choice
        options: [all, openclaw-zero-person, openclaw-coder-agent]

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  ACR_SERVER: acrtemplateopenclaw.azurecr.io
  IMAGE_NAME: acrtemplateopenclaw.azurecr.io/openclaw-prod
  RESOURCE_GROUP: RG-OPENCLAW
  ACA_ENVIRONMENT: openclaw-aca-env

jobs:
  build:
    name: Build & push image to ACR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${SHORT_SHA}"

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}-cache:amd64
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}-cache:amd64,mode=max
          provenance: false

  deploy-main-agent:
    name: Deploy openclaw-zero-person
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'openclaw-zero-person' || github.event.inputs.target == ''
    environment:
      name: production
      url: https://openclaw-zero-person.purplestone-bd490ece.eastus.azurecontainerapps.io
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Deploy to openclaw-zero-person
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: acrtemplateopenclaw
          containerAppName: openclaw-zero-person
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}

      - name: Verify Agent Card
        run: |
          echo "Aguardando container iniciar..."
          sleep 15
          for i in $(seq 1 6); do
            STATUS=$(curl -sf --max-time 10 \
              "https://openclaw-zero-person.purplestone-bd490ece.eastus.azurecontainerapps.io/healthz" \
              -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Container online (tentativa $i)"
              break
            fi
            echo "Tentativa $i/6 — HTTP $STATUS. Aguardando..."
            sleep 10
          done
          echo "Deploy concluido: https://openclaw-zero-person.purplestone-bd490ece.eastus.azurecontainerapps.io"
          echo "Agent Card:       https://openclaw-zero-person.purplestone-bd490ece.eastus.azurecontainerapps.io/.well-known/agent.json"

  deploy-coder-agent:
    name: Deploy openclaw-coder-agent
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'openclaw-coder-agent' || github.event.inputs.target == ''
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Deploy to openclaw-coder-agent
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: acrtemplateopenclaw
          containerAppName: openclaw-coder-agent
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}

      - name: Confirm deploy
        run: |
          echo "Coder agent atualizado com nova imagem."
          echo "Endpoint interno A2A: http://openclaw-coder-agent.internal.purplestone-bd490ece.eastus.azurecontainerapps.io/a2a"
